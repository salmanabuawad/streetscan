# Canonical production vhost (installed once the Let's Encrypt cert exists).
server {
    listen 80;
    server_name scan.kortexd.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name scan.kortexd.com;

    ssl_certificate /etc/letsencrypt/live/scan.kortexd.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/scan.kortexd.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /opt/buqata-streetscan/frontend/dist;
    index index.html;

    client_max_body_size 100M;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:8005/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}
